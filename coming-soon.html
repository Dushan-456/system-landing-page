<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This system is currently under development. Stay tuned!">
    <title>Coming Soon — TechLab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="coming-soon.css">
</head>
<body>

    <!-- Animated Background Orbs -->
    <div class="bg-orbs">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="cs-wrapper">
        <!-- Animated rings -->
        <div class="cs-rings">
            <div class="cs-ring cs-ring--1"></div>
            <div class="cs-ring cs-ring--2"></div>
            <div class="cs-ring cs-ring--3"></div>
        </div>

        <!-- Content -->
        <div class="cs-content">
            <div class="cs-icon">🚀</div>
            <h1 class="cs-title" id="csTitle">Coming Soon</h1>
            <p class="cs-subtitle" id="csSubtitle">This system is currently under development.</p>
            <p class="cs-desc">We're working hard to bring this to you. Stay tuned for updates!</p>

            <div class="cs-progress">
                <div class="cs-progress-bar">
                    <div class="cs-progress-fill"></div>
                </div>
                <span class="cs-progress-label">In Development</span>
            </div>

            <a href="index.html" class="cs-back-btn">
                <span class="cs-back-arrow">←</span>
                Back to All Systems
            </a>
        </div>
    </div>

    <script>
        // Read project name from URL params
        const params = new URLSearchParams(window.location.search);
        const projectName = params.get('project');
        if (projectName) {
            document.getElementById('csTitle').textContent = projectName;
            document.getElementById('csSubtitle').textContent = 'This system is currently under development.';
            document.title = `${projectName} — Coming Soon`;
        }
    </script>
</body>
</html>
