<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TechLab Software Solutions — A curated portfolio of modern web applications and systems developed by Dushan.">
    <title>TechLab — My Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --border-card: rgba(255, 255, 255, 0.08);
            --border-card-hover: rgba(255, 255, 255, 0.18);
            --text-primary: #f0f0f5;
            --text-secondary: #8a8a9a;
            --text-muted: #55556a;
            --accent-blue: #4f8cff;
            --accent-purple: #a855f7;
            --accent-teal: #2dd4bf;
            --accent-rose: #f472b6;
            --accent-amber: #fbbf24;
            --accent-emerald: #34d399;
            --gradient-hero: linear-gradient(135deg, #4f8cff22 0%, #a855f722 50%, #2dd4bf22 100%);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-card-hover: 0 12px 40px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ===== Animated Background ===== */
        .bg-orbs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orbs .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }

        .bg-orbs .orb:nth-child(1) {
            width: 500px; height: 500px;
            background: var(--accent-blue);
            top: -10%; left: -5%;
            animation-duration: 22s;
        }
        .bg-orbs .orb:nth-child(2) {
            width: 400px; height: 400px;
            background: var(--accent-purple);
            top: 40%; right: -8%;
            animation-duration: 18s;
            animation-delay: -5s;
        }
        .bg-orbs .orb:nth-child(3) {
            width: 350px; height: 350px;
            background: var(--accent-teal);
            bottom: -5%; left: 30%;
            animation-duration: 25s;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(40px, -30px) scale(1.05); }
            66%  { transform: translate(-20px, 20px) scale(0.95); }
            100% { transform: translate(30px, -10px) scale(1.02); }
        }

        /* ===== Layout ===== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== Header / Hero ===== */
        header {
            padding: 60px 0 20px;
            text-align: center;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 4px 20px rgba(79, 140, 255, 0.35);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 40%, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, #c0c0d0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 560px;
            margin: 0 auto 40px;
            font-weight: 400;
        }

        /* ===== Search & Filter Bar ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 48px;
        }

        .search-box {
            position: relative;
            flex: 1 1 320px;
            max-width: 460px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border: 1px solid var(--border-card);
            border-radius: 50px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            backdrop-filter: blur(12px);
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .search-box input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.15);
        }

        .search-box .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            pointer-events: none;
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-pill {
            padding: 10px 20px;
            border: 1px solid var(--border-card);
            border-radius: 50px;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all var(--transition);
        }

        .filter-pill:hover {
            border-color: var(--border-card-hover);
            color: var(--text-primary);
            background: var(--bg-card-hover);
        }

        .filter-pill.active {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 16px rgba(79, 140, 255, 0.3);
        }

        /* ===== Cards Grid ===== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            padding-bottom: 80px;
        }

        .card {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius);
            padding: 28px 28px 24px;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow-card);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            animation: cardIn 0.6s ease forwards;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--card-accent, linear-gradient(90deg, var(--accent-blue), var(--accent-purple)));
            opacity: 0;
            transition: opacity var(--transition);
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: var(--border-card-hover);
            box-shadow: var(--shadow-card-hover);
            background: var(--bg-card-hover);
        }

        .card:hover::before { opacity: 1; }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .card-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 20px;
            background: var(--icon-bg, rgba(79, 140, 255, 0.12));
            color: var(--icon-color, var(--accent-blue));
            transition: transform var(--transition);
        }

        .card:hover .card-icon { transform: scale(1.08); }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            flex: 1;
            margin-bottom: 18px;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid var(--border-card);
        }

        .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .card-tag {
            padding: 4px 10px;
            font-size: 0.72rem;
            font-weight: 600;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .card-arrow {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .card:hover .card-arrow {
            background: var(--accent-blue);
            color: #fff;
            transform: translateX(3px);
        }

        /* ===== Empty State ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 1.05rem;
        }

        /* ===== Footer ===== */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 0 32px;
            color: var(--text-muted);
            font-size: 0.82rem;
            border-top: 1px solid var(--border-card);
        }

        footer a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color var(--transition);
        }

        footer a:hover { color: var(--accent-purple); }

        /* ===== Stat Counters ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
            margin-top: 2px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            header { padding: 40px 0 10px; }
            .cards-grid { grid-template-columns: 1fr; gap: 16px; }
            .stats-bar { gap: 24px; }
            .toolbar { padding: 0 4px; }
        }

        @media (max-width: 420px) {
            .card { padding: 22px 20px 18px; }
            .card-title { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <!-- Animated Background Orbs -->
    <div class="bg-orbs">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <div class="logo-icon">T</div>
                <span class="logo-text">TechLab</span>
            </div>
            <h1>My Developed Systems</h1>
            <p>A curated collection of web applications and software systems I've designed and built.</p>
        </header>

        <!-- Stats -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total Systems</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="statWeb">0</div>
                <div class="stat-label">Web Apps</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="statDesktop">0</div>
                <div class="stat-label">Desktop / Other</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search systems…" autocomplete="off">
            </div>
            <div class="filter-pills" id="filterPills">
                <button class="filter-pill active" data-filter="all">All</button>
                <button class="filter-pill" data-filter="web">Web App</button>
                <button class="filter-pill" data-filter="fullstack">Full-Stack</button>
                <button class="filter-pill" data-filter="automation">Automation</button>
                <button class="filter-pill" data-filter="mobile">Mobile</button>
            </div>
        </div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            © 2026 <a href="#">TechLab Software Solutions</a> — Built with ❤️ by Dushan
        </div>
    </footer>

    <script>
        // ====================================================
        //  PROJECT DATA — Edit this array to add/remove systems
        // ====================================================
        const projects = [
            {
                title: "Meeting Room Booking System",
                desc: "A comprehensive room reservation platform for managing conference rooms, time slots, and bookings with an intuitive calendar view.",
                icon: "📅",
                tags: ["web", "fullstack"],
                link: "#", // ← Replace with your live URL
                accentFrom: "#4f8cff",
                accentTo: "#6366f1"
            },
            {
                title: "Office Internal Management System",
                desc: "All-in-one internal management suite for handling office operations, user management, analytics dashboards, and administrative workflows.",
                icon: "🏢",
                tags: ["web", "fullstack"],
                link: "#",
                accentFrom: "#a855f7",
                accentTo: "#ec4899"
            },
            {
                title: "MSF Automation",
                desc: "SurveyMonkey automation platform with real-time API integration, survey analysis, folder management, and data export capabilities.",
                icon: "⚡",
                tags: ["web", "automation"],
                link: "#",
                accentFrom: "#2dd4bf",
                accentTo: "#22d3ee"
            },
            {
                title: "Vehicle Parking Management System",
                desc: "Smart parking management solution for tracking vehicles, managing parking slots, generating reports, and streamlining operations.",
                icon: "🚗",
                tags: ["web", "fullstack"],
                link: "#",
                accentFrom: "#f472b6",
                accentTo: "#fb7185"
            },
            {
                title: "Hostel Management System",
                desc: "End-to-end hostel administration platform covering room allocation, resident management, payments, and facility tracking.",
                icon: "🏨",
                tags: ["web", "fullstack"],
                link: "#",
                accentFrom: "#fbbf24",
                accentTo: "#f97316"
            },
            {
                title: "OT Calculator",
                desc: "Overtime calculation tool for accurately computing work hours, overtime rates, and generating payroll-ready summaries.",
                icon: "🧮",
                tags: ["web"],
                link: "#",
                accentFrom: "#34d399",
                accentTo: "#10b981"
            },
            {
                title: "BookNet — Smart Book Shop",
                desc: "Online bookstore application for browsing, searching, and purchasing books with inventory management for shop owners.",
                icon: "📚",
                tags: ["web", "fullstack"],
                link: "#",
                accentFrom: "#6366f1",
                accentTo: "#8b5cf6"
            },
            {
                title: "Car Rental Project",
                desc: "Feature-rich car rental system with vehicle listing, booking management, customer profiles, and availability tracking.",
                icon: "🚙",
                tags: ["web", "fullstack"],
                link: "#",
                accentFrom: "#f43f5e",
                accentTo: "#e11d48"
            },
            {
                title: "Library E-Repository",
                desc: "Digital document repository for libraries to manage, search, and distribute electronic resources and publications.",
                icon: "📂",
                tags: ["web"],
                link: "#",
                accentFrom: "#0ea5e9",
                accentTo: "#0284c7"
            },
            {
                title: "Full-Stack Template",
                desc: "Production-ready boilerplate template with Express backend and React frontend, pre-configured with auth, routing, and best practices.",
                icon: "🛠️",
                tags: ["fullstack"],
                link: "#",
                accentFrom: "#64748b",
                accentTo: "#475569"
            }
        ];

        // ====================================================
        //  Render & Interactions
        // ====================================================
        const grid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');
        const filterPills = document.querySelectorAll('.filter-pill');
        let activeFilter = 'all';

        function renderCards(filter = 'all', search = '') {
            const filtered = projects.filter(p => {
                const matchFilter = filter === 'all' || p.tags.includes(filter);
                const matchSearch = !search || p.title.toLowerCase().includes(search.toLowerCase()) || p.desc.toLowerCase().includes(search.toLowerCase());
                return matchFilter && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        <p>No systems found matching your criteria.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = filtered.map((p, i) => `
                <a href="${p.link}" class="card" style="animation-delay: ${i * 0.08}s; --card-accent: linear-gradient(90deg, ${p.accentFrom}, ${p.accentTo});" target="_blank" rel="noopener">
                    <div class="card-icon" style="--icon-bg: ${p.accentFrom}18; --icon-color: ${p.accentFrom};">
                        ${p.icon}
                    </div>
                    <div class="card-title">${p.title}</div>
                    <div class="card-desc">${p.desc}</div>
                    <div class="card-footer">
                        <div class="card-tags">
                            ${p.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
                        </div>
                        <div class="card-arrow">→</div>
                    </div>
                </a>
            `).join('');
        }

        // Stats
        function updateStats() {
            const total = projects.length;
            const web = projects.filter(p => p.tags.includes('web')).length;
            const other = total - web;
            animateCounter('statTotal', total);
            animateCounter('statWeb', web);
            animateCounter('statDesktop', other);
        }

        function animateCounter(id, target) {
            const el = document.getElementById(id);
            let current = 0;
            const step = Math.ceil(target / 30);
            const interval = setInterval(() => {
                current += step;
                if (current >= target) { current = target; clearInterval(interval); }
                el.textContent = current;
            }, 35);
        }

        // Filter pills
        filterPills.forEach(pill => {
            pill.addEventListener('click', () => {
                filterPills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                activeFilter = pill.dataset.filter;
                renderCards(activeFilter, searchInput.value);
            });
        });

        // Search
        searchInput.addEventListener('input', () => {
            renderCards(activeFilter, searchInput.value);
        });

        // Initial render
        renderCards();
        updateStats();
    </script>
</body>
</html>
